name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/android-app/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --warning-mode all

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: brawl-vpn-debug-apk
          path: apps/android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
