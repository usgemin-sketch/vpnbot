name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/android-app/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        continue-on-error: true
        run: ./gradlew assembleDebug --stacktrace --warning-mode all > build.log 2>&1

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: apps/android-app/build.log
          if-no-files-found: error

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: brawl-vpn-debug-apk
          path: apps/android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Surface Gradle error snippet
        if: steps.build.outcome != 'success'
        shell: bash
        run: |
          tail -n 120 build.log > build-tail.txt
          message=$(python3 - <<'PY'
from pathlib import Path
text = Path("build-tail.txt").read_text(encoding="utf-8", errors="ignore")
text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
print(text)
PY
)
          echo "::error file=apps/android-app/build.log,line=1,title=Gradle build failed::$message"

      - name: Fail workflow if build failed
        if: steps.build.outcome != 'success'
        run: exit 1
